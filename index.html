<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIDGE | Research & Innovation for Democratic Governance</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #001F3F; /* Deep Navy */
            --accent-blue: #0056b3;
            --text-gray: #444;
            --light-bg: #f4f7f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: var(--text-gray);
            line-height: 1.6;
        }

        h1, h2, h3, .vision-text {
            font-family: 'Lora', serif;
            color: var(--primary-dark);
        }

        /* Header / Hero Section */
        header {
            background: linear-gradient(rgba(0, 31, 63, 0.9), rgba(0, 31, 63, 0.9)), 
                        url('https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?auto=format&fit=crop&w=1500&q=80'); /* Professional building background */
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        header h1 {
            color: white;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2rem;
            max-width: 800px;
            margin: 20px auto;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #fff;
            padding-bottom: 10px;
            display: inline-block;
        }

        /* Container & Cards */
        .container {
            max-width: 1100px;
            margin: -50px auto 40px;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            margin-bottom: 30px;
            border-top: 5px solid var(--primary-dark);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Content Styling */
        .vision-section {
            background: var(--primary-dark);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .vision-section h2 { color: white; }

        .values-list {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .value-item {
            text-align: center;
            flex: 1;
            min-width: 200px;
            padding: 20px;
        }

            font-size: 1.3
